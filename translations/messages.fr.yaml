footer:
    mentions_legales_cgu:
        lien: 'Mentions légales et CGU'
        titre: "Conditions d'utilisation du service d'affiliation des communautaires européens inactifs"
        preambule:
            titre: 'Préambule'
            contenu: 'Les présentes conditions générales d’utilisation ont pour objet de définir les modalités et conditions dans lesquelles la Caisse Nationale de l’Assurance Maladie met le service à disposition de l’Utilisateur.<br><br>
                    En acceptant sans réserve les présentes Conditions Générales d’Utilisation, l’utilisateur confirme son accord des conditions générales d’utilisation suivantes sur le Téléservice « Service d’affiliation des communautaires européens inactifs » et consent au traitement de ses données à caractère personnel tel que décrit ci-après.<br><br>
                    Le TLS, ses contenus et services et les présentes Conditions Générales d’Utilisation sont régis par le droit français, quel que soit le lieu d’utilisation. En cas de contestation éventuelle, et après l’échec de toute tentative de recherche d’une solution amiable, les tribunaux administratifs français seront seuls compétents pour répondre à ce litige.'
        presentation_service:
            titre: '1. Présentation du service'
            contenu: 'Ce service s’adresse à l’ensemble des ressortissants des pays membres de l’Union Européenne, de l’Espace Economique Européen ou de la Suisse (UE-EEE-Suisse) inactifs installés en France depuis plus de trois mois de façon permanente.<br><br>
                    Il permet à tout demandeur européen inactif de :<br>
                    -	effectuer sa demande en ligne d’affiliation au régime d’Assurance Maladie français auprès de la CPAM du Gard (CREIC)<br>
                    -	déposer les justificatifs correspondants<br><br>

                    Ce service de dépôt est disponible et accessible sur ameli.fr, le site de l’assurance maladie.<br><br>

                    Les ressortissants communautaires peuvent demander leur affiliation auprès du régime français d’assurance maladie afin de bénéficier de la prise en charge des frais de santé.<br><br>
                    Le téléservice a pour objectif de dématérialiser les échanges de ces demandeurs avec le CREIC et offre un espace d’échanges confidentiel afin de consolider la validité de la demande (routage de la demande suite questionnaire, création / Gestion compte utilisateur, suivi d’une demande avec accès à un espace de communication avec le CREIC, dépôt de pièces justificatives, traduction autres langues).<br><br>
                    Le présent service contient des fonctionnalités d’envoi de messages interactifs et personnalisés.<br><br>
                    L’utilisation du présent service nécessite l’expression du consentement à la création d’un compte ainsi qu’à l’acceptation des présentes conditions générales d’utilisation. Ces consentements sont matérialisés par une case dédiée à cocher.'
        acces_service:
            titre: '2. Accès au service'
            modalites:
                titre: '2.1 Modalités d’accès au service'
                contenu: 'Les utilisateurs de ce service peuvent y accéder via le site internet de l’assurance maladie édité à l’adresse suivante https://inactif-europeen.ameli.fr. L’utilisation de ce service sont totalement gratuite (hors coûts éventuellement liés à votre abonnement auprès d’un fournisseur d’accès).'
            disponibilite:
                titre: '2.2 Disponibilité du service'
                contenu: 'Le présent service est accessible 7 jours sur 7 et 24 heures sur 24 à l’exception des cas de force majeure, de difficultés informatiques, de difficultés liées à la structure du réseau de télécommunication ou de difficultés techniques.<br>
                    Pour des raisons de maintenance, l’assurance maladie pourra interrompre l’accès au service et s’efforcera d’en avertir préalablement les utilisateurs. L’indisponibilité du service ne donne droit à aucune indemnité.<br>
                    Un support/assistance est assuré 5j/7J de 9h à 17h (indisponible de 17h à 9h, et les samedis et dimanches).<br>
                    L’assurance maladie ne saurait être tenue responsable des conséquences liées à une absence de disponibilité du service pour l’un des motifs susmentionnés.'
        gestion_profil:
            titre: '3. Gestion de profil'
            creation_compte:
                titre: "3.1 Création d'un compte"
                contenu: "Afin de pouvoir bénéficier de ce service, l’utilisateur doit préalablement créer un compte en renseignant ses coordonnées personnelles telles que précisées ci-après et accepter les présentes conditions générales d’utilisation.<br><br>
                         Lors de sa première connexion, l’utilisateur est invité à :<br>
                         •	saisir son adresse de courrier électronique ;<br>
                         •	choisir un mot de passe composé d’au moins 12 caractères dont au moins une majuscule, une minuscule, un chiffre et un caractère spécial.<br><br>
                         Le mot de passe du service est strictement personnel, il convient de le garder secret. Par sécurité, l'utilisateur est invité à ne jamais communiquer le mot de passe permettant l'accès à son compte personnel.<br><br>
                         Une fois ces données renseignées pour créer son compte, un email de confirmation est envoyé à l’adresse de courrier électronique renseignée pour valider son inscription.<br><br>
                         À partir de la deuxième connexion, l’utilisateur a la possibilité de personnaliser son accès au service et notamment de :<br>
                         •	modifier des informations personnelles et mot de passe<br>
                         •	supprimer son compte"
            gestion_compte:
                titre: "3.2 Gestion du compte"
                utilisation_email:
                    titre: "3.2.1 Utilisation de l’adresse de courrier électronique"
                    contenu: "La saisie d'une adresse email valide est obligatoire pour bénéficier de ce service notamment aux fins de création d’un compte.<br>
                             En renseignant et confirmant son email, l’utilisateur accepte de recevoir des messages issus du service sur son adresse électronique."
                notifications:
                    titre: "3.2.2 Notifications"
                    contenu: "L’utilisateur recevra, tout au long du service, un ensemble de :<br>
                             •	messages d’information lui notifiant la réception de messages dans son espace personnel,<br>
                             •	messages relatifs à la gestion de son compte personnel,<br>
                             •	messages relatifs à l’instruction de sa demande."
                perte_mdp:
                    titre: "3.2.3 Perte de son mot de passe"
                    contenu: "L’utilisateur aura la possibilité, en cas de perte de son mot de passe, d’en générer un nouveau via un lien figurant à proximité du champ de saisie du mot de passe. Ce lien renvoie sur un formulaire de saisie de l’identifiant (adresse email) dont la confirmation génère l’envoi d’un email à l’utilisateur comprenant un lien à usage unique. En utilisant ce lien, l’utilisateur accède à une page lui permettant d’en saisir un nouveau."
                changement_mdp:
                    titre: "3.2.4 Changement de mot de passe"
                    contenu: "Le changement de mot de passe est possible depuis l’onglet « changement des préférences », par saisie dans trois champs distincts du mot de passe actuel, du nouveau mot de passe et de la confirmation de ce nouveau mot de passe."
                consultation_donnees_compte:
                    titre: "3.2.5 Consultation des données du compte"
                    contenu: "L’utilisateur a la possibilité d’accéder à l’ensemble des données issues de son compte et de prendre connaissance des informations le concernant. Le demandeur ne peut consulter que le statut du dossier et les principales informations en cas de prise en compte de la demande par le CREIC."
            suppression_compte:
                titre: "3.3 Suppression du compte"
                contenu: "La suppression de compte est possible uniquement si l’Utilisateur n’a aucune demande en cours. Elle est accessible dans l’onglet « changement des préférences ». Elle est activée après saisie de son mot de passe par l’Utilisateur. Elle entraine la suppression définitive de son compte et la suppression de tout envoi de messages issus du service. La suppression du compte n’entraîne pas la suppression du dossier demandeur (ni des données associées) au CREIC."
        protection_donnees:
            titre: "4. Protection des données personnelles"
            preambule:
                titre: "4.1 Préambule"
                contenu: "L’Assurance Maladie traite l’ensemble de données personnelles qui lui sont confiées dans le cadre de ses missions et dans le respect des exigences règlementaires relatives à la protection des données personnelles et de la vie privée des personnes. La Politique générale de protection des données personnelles de l'Assurance Maladie est disponible sur ameli.fr.<br><br>
                         Ce traitement a pour finalité principale de permettre aux demandeurs d’effectuer certaines démarches et d’accéder aux informations les concernant et qui sont détenues par les organismes d’assurance maladie dans le cadre de leurs missions."
            responsable_traitement:
                titre: "4.2 Responsable de traitement - Sous-traitant"
                contenu: "La Cnam est le responsable du traitement de données au sens du règlement général sur la protection des données (RGPD) et de la loi n°78-17 du 6 janvier 1978 relative à l’informatique, aux fichiers et aux libertés modifiée.<br>br>
                         A ce titre, elle s’engage à prendre toutes précautions utiles au regard de la nature des données et des risques présentés par le traitement pour préserver la sécurité des données et, notamment, empêcher qu’elles soient déformées, endommagées ou que des tiers non autorisés y aient accès.<br><br>
                         L’Assurance Maladie ne pourra être tenue pour responsable des dommages que causerait un utilisateur du TLS CREIC en exploitant des informations issues de ce site à d’autres fins que celles auxquelles elles sont destinées."
            donnees_collectees:
                titre: "4.3 Données collectées"
                contenu: "Les informations du compte proviennent des données saisies par l’utilisateur, des pièces justificatives déposées par l’utilisateur, et des bases de données mises en œuvre par l’Assurance Maladie dans le cadre de ses missions et notamment pour assurer l’affiliation, le remboursement, la gestion de la relation avec les publics.<br><br>
                         Les catégories de données traitées sont :<br>
                         •	des données d’identification et de contact du demandeur dont les NIR, civilité, nom, prénom, date de naissance, nationalité, adresse de courrier électronique, adresse postale, numéros de téléphone<br>
                         •	des données d’identification concernant les ayants droit dont les civilité, nom, prénom, date de naissance, nationalité, lien de parenté avec le demandeur<br>
                         •	des données d’identification concernant l’éventuel hébergeant du demandeur dont les civilité, nom, prénom, date de naissance, lien de parenté avec le demandeur<br>
                         •	des données relatives aux contrats d’organismes pour la couverture maladie obligatoire et complémentaire dont les dates, bénéfice d’une prestation dont la complémentaire santé solidaire<br>
                         •	des données financières dont les ressources du foyer<br>
                         •	des données relatives à la situation professionnelle ainsi que la composition du foyer<br>
                         •	des traces des accès en consultation ou en modification aux données relatives aux demandes<br><br>
                        Les organismes de l’Assurance Maladie peuvent être tenus de fournir ou échanger des informations avec leurs partenaires (Caisses d’Allocations Familiales, Direction Générale des Finances Publiques, Pôle Emploi, etc.) dans le cadre de leurs missions ou d’obligations légales.<br><br>
                        Une information particulière est alors également portée à la connaissance des personnes concernées via les mentions spécifiques d’information et les éventuelles Conditions Générales d’Utilisation (CGU) concernant lesdits services."
            duree_conservation:
                titre: "4.4 Durée de conservation des données"
                contenu: "L’ensemble des documents échangés sont conservés dans DIADEME et non dans le Back Office du téléservice CREIC.<br>
                         Les données concernant les demandes d’un utilisateur sont conservées pendant 5 ans après la dernière décision rendue sur une demande de l’utilisateur."
            securite_donnees:
                titre: "4.5 Sécurité des données"
                contenu: "Avant toute utilisation du compte, il appartient aux assurés de s'assurer, d'une part, que le navigateur ou le réseau à partir duquel ils accèderont au site (réseau domestique ou réseau de l'opérateur de téléphonie mobile) et, d'autre part, que l'environnement d'exploitation des appareils sur lesquels l’application est installée, permettent l'accès dans une configuration sécurisée.<br><br>
                         Il leur appartient également de vérifier que la configuration informatique utilisée et l'environnement d'exploitation du ou des appareils utilisés sont sécurisés et ne contiennent notamment aucun virus et qu'ils sont en bon état de fonctionnement.<br><br>
                         Seuls les agents individuellement habilités par le directeur de leur organisme local d’assurance maladie peuvent accéder aux données strictement nécessaires à l’exercice de leurs missions, dans la limite du besoin d’en connaître et le respect du secret professionnel.<br><br>
                         Il est demandé à l’utilisateur de modifier son mot de passe à fréquence régulière."
            droit_acces:
                titre: "4.6 Droit d’accès, de rectification et d’opposition"
                contenu: "Conformément à la règlementation relative à la protection des données en vigueur, l’assuré dispose d’un droit d’accès et de rectification sur le traitement de ses données.<br><br>
                         Ces droits s’exercent auprès du Directeur de sa caisse d’assurance maladie de rattachement en contactant le délégué à la protection des données (DPO).<br><br>
                         En cas de difficultés dans l’application des droits énoncés ci-dessus, toute personne peut également introduire une réclamation auprès de l’autorité indépendante en charge du respect de la protection des données personnelles :<br><br>
                         Commission Nationale Informatique et Libertés - CNIL – 3 Place de Fontenoy TSA – 80715 – 75334 PARIS CEDEX 07."
            gestion_traceurs:
                titre: "4.7 Gestion des traceurs (cookies)"
                contenu: "Un cookie est un petit fichier texte déposé sur votre terminal (ordinateur, tablette ou mobile) lors de la visite de notre site/plateforme/application. Il contient plusieurs données dont le nom du serveur qui l'a déposé, un identifiant sous forme de numéro unique, éventuellement une date d'expiration.<br><br>
                         Les cookies ont différentes fonctions. Ils peuvent permettre à celui qui l’a déposé de reconnaître un internaute, d’une visite à une autre, grâce à un identifiant unique.<br><br>
                         Certains cookies peuvent aussi être utilisés pour stocker le contenu d’un mot de passe, d’autres pour enregistrer les paramètres de langue d’un site, d’autres encore de vous adresser des services personnalisés.<br><br>
                         L’Assurance Maladie s’engage, dans le cadre des missions qui lui sont confiées, à assurer la protection, la confidentialité et la sécurité de l’ensemble de vos données personnelles dans le respect de votre vie privée. Lorsque vous naviguez sur notre site, nous pouvons être amenés à déposer différents types de cookies sur votre terminal. Ils ont des finalités différentes décrites ci-dessous.<br><br>
                         Les cookies strictement nécessaires au fonctionnement du site : Ces cookies permettent de garantir des fonctionnalités importantes du site comme la possibilité de passer d’une page à l’autre.<br><br>
                         Le site web ne pouvant fonctionner correctement sans eux, ils ne peuvent être désactivés.<br><br>
                         <div class='row'>
                            <div class='col-10 mx-auto'>
                                <table class='table table-bordered'>
                                    <tr>
                                        <th class='w-25 table-primary align-middle text-center'>Nom des cookies</th>
                                        <th class='w-50 table-primary align-middle text-center'>Finalité</th>
                                        <th class='w-25 table-primary align-middle text-center'>Durée de conservation</th>
                                    </tr>
                                    <tr>
                                        <td>PHPSESSID</td>
                                        <td>Cookie de session (cookie permettant au site de reconnaître l’utilisateur d’une page à l’autre pendant sa visite ; quand le navigateur Internet est fermé, ce cookie disparaît et il n’y a plus de trace sur l’appareil de l’utilisateur de son passage sur le site)</td>
                                        <td>Durée de la session de l’utilisateur</td>
                                    </tr>
                                 </table>
                            </div>
                         </div>
                         "
        responsabilite:
            titre: "5. Responsabilité"
            avertissement_contenu:
                titre: "5.1 Avertissement sur les contenus du service"
                contenu: "L’utilisateur reconnait que la responsabilité de l’Assurance Maladie ne pourra être recherchée, au titre de l'information et des services proposés, et l’utilisateur accepte que l'utilisation de ces informations et services s'effectue sous sa seule et entière responsabilité, son contrôle et sa direction."
            responsabilite_utilisateur:
                titre: "5.2 Responsabilité de l’utilisateur"
                contenu: "Les données traitées dans le cadre du service sont des données à caractère personnel, couvertes à ce titre par les dispositions de la loi Informatique et libertés et dont la violation est réprimée par l’article 226-13 du code pénal.<br><br>
                         L’utilisateur est seul responsable de l’utilisation du service et des contenus renseignés et exportés par ses soins conformément à son usage, dans le respect des lois et règlements en vigueur et des présentes conditions générales d’utilisation.<br><br>
                         L’utilisateur est responsable de la conservation de ses identifiant et mot de passe. Il s’interdit donc de les divulguer à quiconque. En cas de perte ou de vol de ses identifiants d’accès, l’utilisateur peut changer son mot de passe.<br><br>
                         L’utilisateur s’engage toutefois à respecter les règles d'ordre public qui s’imposent à lui telle que par exemple la réglementation en matière de contenu pornographique, raciste ou illicite qui serait susceptible de porter atteinte à l'intégrité ou à la sensibilité d'un autre utilisateur ou d’une institution par l'intermédiaire de messages, textes ou images provocants.<br><br>
                         À ce titre, vous vous engagez à vous abstenir de diffuser au sein des services interactifs qui vous sont proposés des messages à caractère injurieux, insultant, dénigrant, dégradant ou n'ayant aucun lien avec les questions abordées."
            responsabilite_am:
                titre: "5.3 Responsabilité de l’Assurance maladie"
                contenu: "En sa qualité de responsable de traitement, l’Assurance maladie a pris toutes les mesures utiles pour assurer la sécurité des données contenues dans le service.<br><br>
                         L’Assurance maladie dégage toute responsabilité en cas de :<br>
                         •	survenance d'un événement de force majeure ayant un impact sur le service,<br>
                         •	problèmes liés au réseau internet,<br>
                         •	pannes ou dommages résultant des équipements de l'utilisateur ou encore de la contamination du système informatique de l'utilisateur par des virus, attaques et malveillances de tiers,<br>
                         •	utilisation du TLS par l'utilisateur non conforme aux présentes conditions générales d'utilisation.<br><br>
                         L’Assurance maladie ne saurait être tenue responsable des conséquences liées à une absence de disponibilité du service pour l’un des motifs mentionnés dans la partie « Disponibilité du service »."
        propriete_intellectuelle:
            titre: "6. Propriété intellectuelle"
            contenu: "Pour tous les contenus, textes et logos présentés sur le site internet : tous droits d'auteur des œuvres sont réservés.<br><br>
                     Sauf autorisation formelle écrite préalable, la reproduction ainsi que toute utilisation des œuvres, autres que la consultation individuelle et privée, sont interdites.<br><br>
                     Toute demande d'autorisation pour quelque utilisation que ce soit doit être adressée à :<br><br>
                     ASSURANCE MALADIE<br>
                    Direction de la communication<br>
                    26-50, avenue du Professeur André-Lemierre<br>
                    75986 Paris cedex 20"
        fermer: 'Retour'

home:
    index:
