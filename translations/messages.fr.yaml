        heading: 'Inscription des ressortissants européens inactifs à l’Assurance Maladie'
        premiere_demande: 'C’est ma première demande'
        renouvellement: 'Je demande un renouvellement'
        pourquoi:
            titre: 'Pourquoi vous inscrire sur ce site ?'
            contenu: 'Vous répondez aux 3 critères suivants :<br>
                <ol>
                    <li>Vous êtes ressortissant d’un pays membre de l’Union Européenne, de l’Espace Economique Européen ou de la Suisse (UE-EEE-Suisse)</li>
                    <li>Vous êtes installé de façon permanente sur le territoire français depuis plus de 3 mois</li>
                    <li>Vous n’exercez pas d’activité professionnelle et vous n’êtes ni retraité, ni pensionné, ni étudiant.</li>
                </ol>
                Vous pouvez potentiellement prétendre à une couverture Assurance Maladie afin de bénéficier de la prise en charge d’une partie de vos frais de santé.'
